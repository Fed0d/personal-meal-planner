databaseChangeLog:
  - changeSet:
      id: 002-create-refresh-token
      author: fedod
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_refresh_token
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            referencedTableName: auth_user
            referencedColumnNames: id
            constraintName: fk_refresh_token_user

        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_user_hash
            columns:
              - column:
                  name: token_hash

        - createIndex:
            tableName: refresh_token
            indexName: idx_refresh_token_expires_at
            columns:
              - column:
                  name: expires_at
