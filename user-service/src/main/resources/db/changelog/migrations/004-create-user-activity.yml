databaseChangeLog:
  - changeSet:
      id: 004-create-user-activity
      author: fedod
      changes:
        - createTable:
            tableName: user_activity
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_activity
                    nullable: false

              - column:
                  name: activity_level
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_activity
            baseColumnNames: user_id
            referencedTableName: user_profile
            referencedColumnNames: user_id
            constraintName: fk_user_activity_user_profile
            onDelete: CASCADE
