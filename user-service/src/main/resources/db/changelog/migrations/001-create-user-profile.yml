databaseChangeLog:
  - changeSet:
      id: 001-create-user-profile
      author: fedod
      changes:
        - createTable:
            tableName: user_profile
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_profile
                    nullable: false

              - column:
                  name: first_name
                  type: varchar(100)
                  constraints:
                    nullable: true

              - column:
                  name: last_name
                  type: varchar(100)
                  constraints:
                    nullable: true

              - column:
                  name: birth_date
                  type: date
                  constraints:
                    nullable: true

              - column:
                  name: gender
                  type: varchar(20)
                  constraints:
                    nullable: true

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
