databaseChangeLog:
  - changeSet:
      id: 001-create-meal-plan
      author: fedod
      changes:
        - createTable:
            tableName: meal_plan
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_meal_plan
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: meal_plan
            columnNames: user_id, date
            constraintName: uq_meal_plan_user_date
