databaseChangeLog:
  - changeSet:
      id: 002-create-meal-plan-item
      author: fedod
      changes:
        - createTable:
            tableName: meal_plan_item
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_meal_plan_item
                    nullable: false

              - column:
                  name: meal_plan_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: meal_slot
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: dish_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: dish_name
                  type: varchar(200)
                  constraints:
                    nullable: false

              - column:
                  name: calories
                  type: decimal(7, 2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: meal_plan_item
            baseColumnNames: meal_plan_id
            referencedTableName: meal_plan
            referencedColumnNames: id
            constraintName: fk_meal_plan_item_meal_plan
            onDelete: CASCADE
