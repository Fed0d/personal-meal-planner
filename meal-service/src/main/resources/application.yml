server:
  port: 8083

spring:
  application:
    name: meal-service
  datasource:
    url: jdbc:postgresql://localhost:5432/meal_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yml
    enabled: true

security:
  jwt:
    public-key-path: classpath:keys/public_key.pem
    issuer: auth-service
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
