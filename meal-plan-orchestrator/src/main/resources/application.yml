server:
  port: 8085

spring:
  application:
    name: meal-plan-orchestrator
  datasource:
    url: jdbc:postgresql://localhost:5432/orchestrator_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yml
    enabled: true

  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      bootstrap-servers: localhost:9092
      group-id: meal-plan-orchestrator
      properties:
        spring.json.trusted.packages: fedod.meal.plan.orchestrator.dto.kafka

security:
  jwt:
    public-key-path: classpath:keys/public_key.pem
    issuer: auth-service
    enabled: true

kafka:
  topics:
    generate-mealplan-command: generate.mealplan.command
    replace-mealplan-command: replace.mealplan.command
    job-updated-event: job.updated.event

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
